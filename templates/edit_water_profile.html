{% extends "base.html" %}

{% block content %}

<h2>💧 {% if profile %}Edit{% else %}Set Up{% endif %} Water Profile</h2>

<div class="form-box">
    <form action="/save_water_profile" method="POST">

        <label for="age">Age (years)</label>
        <input type="number" id="age" name="age" min="0" max="120"
               placeholder="e.g. 72"
               value="{{ profile[1] if profile else '' }}" required>

        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
            <option value="" disabled {% if not profile %}selected{% endif %}>-- Select gender --</option>
            <option value="male"   {% if profile and profile[2] == 'male'   %}selected{% endif %}>Male</option>
            <option value="female" {% if profile and profile[2] == 'female' %}selected{% endif %}>Female</option>
        </select>

        <label for="weight_kg">Weight (kg)</label>
        <input type="number" id="weight_kg" name="weight_kg" min="1" max="300"
               step="0.1" placeholder="e.g. 68.5"
               value="{{ profile[3] if profile else '' }}" required>

        <label for="height_cm">Height (cm)</label>
        <input type="number" id="height_cm" name="height_cm" min="30" max="250"
               step="0.1" placeholder="e.g. 165"
               value="{{ profile[4] if profile else '' }}" required>

        <label for="activity_level">Activity Level</label>
        <select id="activity_level" name="activity_level" required>
            <option value="" disabled {% if not profile %}selected{% endif %}>-- Select activity --</option>
            <option value="light"    {% if profile and profile[5] == 'light'    %}selected{% endif %}>Light — sedentary / bed rest</option>
            <option value="moderate" {% if profile and profile[5] == 'moderate' %}selected{% endif %}>Moderate — some walking / light physio</option>
            <option value="high"     {% if profile and profile[5] == 'high'     %}selected{% endif %}>High — active rehabilitation / exercise</option>
        </select>

        <button type="submit">{% if profile %}Update Profile{% else %}Save Profile{% endif %}</button>
    </form>
</div>

<br>
<a href="/water_profile" class="edit-btn" style="display:inline-block;margin-top:10px;">← Back</a>

{% endblock %}
