{% extends "base.html" %}

{% block content %}

<h2>⏰ Edit Water Alert Settings</h2>

<div class="form-box" style="width:460px;">
    <form action="/save_water_alerts" method="POST">

        <label style="display:flex;align-items:center;gap:10px;margin-top:10px;cursor:pointer;">
            <input type="checkbox" name="alarm_enabled" id="alarm_enabled"
                   {% if config.alarm_enabled %}checked{% endif %}
                   style="width:18px;height:18px;margin:0;">
            <span>Enable water reminders / alarms</span>
        </label>
        <p class="field-hint">When checked, the robot will alert at each scheduled time slot.</p>

        <hr style="margin:18px 0;border:none;border-top:1px solid #eee;">

        <label>Alert mode</label>

        <label class="radio-option">
            <input type="radio" name="mode" value="smart"
                   {% if config.mode == 'smart' %}checked{% endif %}
                   onchange="toggleCustomField(false)">
            <div>
                <strong>Smart mode</strong>
                <p class="field-hint">Amounts are automatically distributed across the day
                based on your physiological profile and circadian hydration patterns.</p>
            </div>
        </label>

        <label class="radio-option" style="margin-top:10px;">
            <input type="radio" name="mode" value="custom"
                   {% if config.mode == 'custom' %}checked{% endif %}
                   onchange="toggleCustomField(true)">
            <div>
                <strong>Doctor / personal override</strong>
                <p class="field-hint">Set a fixed amount (ml) for every 2-hour slot.
                Use this if your doctor has prescribed a specific intake per reminder.</p>
            </div>
        </label>

        <div id="custom-field" style="display:{% if config.mode == 'custom' %}block{% else %}none{% endif %};">
            <label for="doctor_ml_per_slot" style="margin-top:14px;">Amount per slot (ml)</label>
            <input type="number" id="doctor_ml_per_slot" name="doctor_ml_per_slot"
                   min="50" max="1000" step="10"
                   placeholder="e.g. 200"
                   value="{{ config.doctor_ml_per_slot if config.doctor_ml_per_slot else '' }}">
            <p class="field-hint">
                This amount will appear at every alert — 6 AM, 8 AM, 10 AM, 12 PM, 2 PM, 4 PM, 6 PM.
            </p>
        </div>

        <button type="submit" style="margin-top:20px;">Save Alert Settings</button>
    </form>
</div>

<br>
<a href="/water_profile" class="edit-btn" style="display:inline-block;margin-top:10px;">← Back to Water Profile</a>

<script>
function toggleCustomField(show) {
    document.getElementById('custom-field').style.display = show ? 'block' : 'none';
}
</script>

{% endblock %}
